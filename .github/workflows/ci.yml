name: HRMS CI

on:
  push:
    branches:
      - develop
      - "feature/**"
  pull_request:
    branches:
      - develop

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: |
          cd frontend/hrms-frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend/hrms-frontend
          npm run build

  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Backend check
        run: |
          cd backend
          echo "Backend setup successful"
